<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OMNICALCULUS*</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <!-- Full matrix aesthetics from OMNICODEX.html -->
    <link rel="icon" type="image/icon" href="OMNICODEX.ico">
    <link rel="stylesheet" href="style.css">
    <!-- Math.js for calculation and units -->
    <script src="math.js"></script>
</head>
<body>
<canvas id="matrixRain" aria-hidden="true"></canvas>
<div class="omni-panel">
    <h1>OMNICALCULUS</h1>
    <div class="omni-subtitle">Universal Engineering Calculator</div>
    <div>
        <label for="fieldsel">Field of Study:</label>
        <select id="fieldsel"></select>
    </div>
    <div>
        <label for="forsel">Formula:</label>
        <select id="forsel"></select>
    </div>
    <div class="omni-desc" id="formula-desc"></div>
    <div class="omni-formula" id="formula-str"></div>
    <form id="varsform" autocomplete="off">
        <div class="omni-vars" id="varsinputs"></div>
        <span class="omni-err" id="vars-err" style="display:none;"></span>
        <button type="submit" id="solvebtn">Calculate</button>
    </form>
    <div id="resultbox" class="omni-result"></div>
    <div id="conv-box" style="display:none;">
        <label>Convert result to another unit:</label>
        <input type="text" id="convunit" placeholder="kW, mm², bar, etc.">
        <button type="button" id="convgo">Convert</button>
        <div class="omni-err" id="conv-err" style="display:none;"></div>
        <div id="conv-result" style="color:var(--neo2);font-size:.98em;margin-top:8px;"></div>
    </div>
</div>
<div class="omni-credits">Matrix Edition UI - OMNICALCULUS &bull; Powered by <a href="https://mathjs.org" style="color:#90ffe0;" target="_blank">math.js</a></div>
<script src="app.js"></script>
</body>
</html>
